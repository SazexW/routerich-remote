<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>RouteRich Remote Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px; background: #111; color: #eee; }
    h1 { margin-bottom: 8px; }
    .note { color: #aaa; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
    .card { background: #1b1b1b; border: 1px solid #333; border-radius: 16px; padding: 18px; }
    .name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .ip { color: #aaa; margin-bottom: 14px; }
    a { display: inline-block; margin: 4px 8px 4px 0; padding: 10px 14px; border-radius: 10px; background: #2b2b2b; color: #fff; text-decoration: none; }
    a:hover { background: #3a3a3a; }
    code { background: #222; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>RouteRich Remote Dashboard</h1>
  <div class="note">Замени IP на реальные адреса из <code>tailscale status</code>.</div>

  <div class="grid">
    <div class="card">
      <div class="name">main-sazex</div>
      <div class="ip">100.95.126.243</div>
      <a href="http://100.95.126.243" target="_blank">LuCI</a>
    </div>

    <div class="card">
      <div class="name">lina-routerich</div>
      <div class="ip">100.___.___.___</div>
      <a href="http://100.___.___.___" target="_blank">LuCI</a>
    </div>

    <div class="card">
      <div class="name">ave-routerich</div>
      <div class="ip">100.___.___.___</div>
      <a href="http://100.___.___.___" target="_blank">LuCI</a>
    </div>

    <div class="card">
      <div class="name">kost-routerich</div>
      <div class="ip">100.___.___.___</div>
      <a href="http://100.___.___.___" target="_blank">LuCI</a>
    </div>

    <div class="card">
      <div class="name">bog-routerich</div>
      <div class="ip">100.___.___.___</div>
      <a href="http://100.___.___.___" target="_blank">LuCI</a>
    </div>
  </div>
</body>
</html>
